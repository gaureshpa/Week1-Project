    <header>
        <h1>Contact Us</h1>
        <nav>

    <main>
        <section>
            <h2>Send us a message!</h2>
            <form action="#">
                
                <p>
                    <label for="name">Name: *</label>
                    <input type="text" name="name" id="name" required>
                </p>

                <p>
                    <label for="email">Email: *</label>
                    <input type="email" name="email" id="email" required>
                </p>

                <p>
                    <label for="phone">Phone Number: *</label>
                    <input type="tel" name="phone" id="phone" required>
                </p>

                <p>
                    <label for="dept">Select Department *</label>
                    <input list="dept_list" id="dept" name="dept" required>

                    <datalist id="dept_list">
                        <option value="Macrodata Refinement"></option>
                        <option value="Optics and Design"></option>
                    </datalist>
                </p>

                <p>
                    <label for="message">Message: </label>
                    <textarea name="message" id="message"></textarea>
                </p>

                <p>
                    <label for="newsletter">Agree to receive newsletter</label>
                    <input type="checkbox" name="newsletter" id="newsletter">
                </p>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <section>
            <h2>Addresss</h2>
            <address>
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2483.5970395828235!2d7.570457176619785!3d51.502261771812194!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47b91500402eae41%3A0x865db665f368a813!2sLumon%20Industries!5e0!3m2!1sen!2sin!4v1784711297609!5m2!1sen!2sin" 
                    width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" 
                    referrerpolicy="strict-origin-when-cross-origin"
                >
                </iframe>
                <p>
                    <b>Lumon Industries</b><br>
                    100 Kier Avenue <br>
                    Kier, PE 00001 <br>
                </p>

                <p>
                    <a href="tel:+17282882432">+1 728 2882 432</a> <br>
                    <a href="mailto:admin@lumon.industries">admin@lumon.industries</a>
                </p>

            </address>
        </section>
    </main>
